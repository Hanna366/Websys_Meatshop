<!DOCTYPE html>
<html>
<head>
    <title>Subscription Request Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .button { 
            background: #007bff; 
            color: white; 
            padding: 15px 30px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            margin: 10px;
            font-size: 16px;
        }
        .button:hover { background: #0056b3; }
        .success { color: green; font-weight: bold; }
        .info { background: #f8f9fa; padding: 20px; border-radius: 5px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>Subscription Request Demo</h1>
    
    <div class="info">
        <h3>For Demo Tomorrow:</h3>
        <p><strong>Step 1:</strong> Click any button below to create a subscription request</p>
        <p><strong>Step 2:</strong> Go to <a href="http://127.0.0.1:8000/admin/subscription-requests" target="_blank">Central Billing</a> to see the request immediately</p>
        <p><strong>Step 3:</strong> Approve/reject the request in central billing</p>
    </div>
    
    <h2>Create Subscription Requests:</h2>
    
    <button class="button" onclick="createRequest('basic')">
        Request Basic Plan (₱1,595)
    </button>
    
    <button class="button" onclick="createRequest('standard')">
        Request Standard Plan (₱4,345)
    </button>
    
    <button class="button" onclick="createRequest('premium')">
        Request Premium Plan (₱8,195)
    </button>
    
    <div id="result"></div>
    
    <script>
        async function createRequest(plan) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Creating request...</p>';
            
            try {
                const response = await fetch(`http://127.0.0.1:8000/create-subscription/${plan}`);
                const text = await response.text();
                
                if (response.ok && text.includes('Created subscription request')) {
                    resultDiv.innerHTML = `<p class="success">✅ ${text}</p>
                    <p><strong>Now check <a href="http://127.0.0.1:8000/admin/subscription-requests" target="_blank">Central Billing</a> to see the request!</strong></p>`;
                } else {
                    resultDiv.innerHTML = `<p style="color: red;">❌ Error: ${text}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">❌ Network Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
